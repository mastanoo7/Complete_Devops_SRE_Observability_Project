# ============================================================
# Grafana — Datasources Provisioning
# Auto-configures all observability backends
# ============================================================

apiVersion: 1

datasources:
  # ── Prometheus ────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo
    editable: false

  # ── Thanos (long-term metrics) ───────────────────────────
  - name: Thanos
    type: prometheus
    uid: thanos
    url: http://thanos-query:9090
    access: proxy
    jsonData:
      timeInterval: "15s"
      queryTimeout: "120s"
      httpMethod: POST
    editable: false

  # ── Loki (logs) ──────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"traceId":"(\w+)"'
          name: TraceID
          url: "$${__value.raw}"
          urlDisplayLabel: "View Trace in Tempo"
    editable: false

  # ── Tempo (distributed tracing) ──────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      search:
        hide: false
      nodeGraph:
        enabled: true
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "1h"
        spanEndTimeShift: "-1h"
      spanBar:
        type: Tag
        tag: http.path
    editable: false

  # ── Jaeger (distributed tracing) ─────────────────────────
  - name: Jaeger
    type: jaeger
    uid: jaeger
    url: http://jaeger-query:16686
    access: proxy
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
        mapTagNamesEnabled: true
        mappedTags:
          - key: service.name
            value: service
    editable: false

  # ── Elasticsearch (logs) ─────────────────────────────────
  - name: Elasticsearch
    type: elasticsearch
    uid: elasticsearch
    url: http://elasticsearch:9200
    access: proxy
    database: "nexacommerce-logs-*"
    jsonData:
      esVersion: "8.0.0"
      timeField: "@timestamp"
      logMessageField: message
      logLevelField: level
      maxConcurrentShardRequests: 5
    editable: false

  # ── CloudWatch (AWS metrics) ─────────────────────────────
  - name: CloudWatch
    type: cloudwatch
    uid: cloudwatch
    access: proxy
    jsonData:
      authType: default
      defaultRegion: us-east-1
      customMetricsNamespaces: "NexaCommerce"
    editable: false
