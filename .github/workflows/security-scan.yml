# ============================================================
# GitHub Actions — Security Scan Pipeline
# Runs SAST, SCA, container scanning, secret detection
# ============================================================

name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run full scan nightly at 2 AM UTC
    - cron: "0 2 * * *"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── Secret Detection ─────────────────────────────────────
  secret-scan:
    name: Secret Detection (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ── SAST — Static Analysis ───────────────────────────────
  sast:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [go, java, javascript, python]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ── SCA — Dependency Scanning ────────────────────────────
  sca:
    name: SCA — Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk (Node.js services)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

      - name: Run Snyk (Python services)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: nexacommerce
          path: .
          format: SARIF
          args: >
            --enableRetired
            --failOnCVSS 8

      - name: Upload OWASP results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/dependency-check-report.sarif

  # ── Container Image Scanning ─────────────────────────────
  container-scan:
    name: Container Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: []
    strategy:
      matrix:
        service:
          - auth-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - inventory-service
          - search-service
          - notification-service
          - frontend
      fail-fast: false
    permissions:
      id-token: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.ECR_REGISTRY }}/nexacommerce/${{ matrix.service }}:${{ github.sha }}"
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Run Grype scanner
        uses: anchore/scan-action@v3
        with:
          image: "${{ secrets.ECR_REGISTRY }}/nexacommerce/${{ matrix.service }}:${{ github.sha }}"
          fail-build: true
          severity-cutoff: critical

  # ── IaC Security Scanning ────────────────────────────────
  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov (Terraform)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-terraform.sarif
          soft_fail: false
          check: CKV_AWS_*

      - name: Run Checkov (Kubernetes)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: kubernetes/
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-k8s.sarif
          soft_fail: false

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-terraform.sarif

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Kubesec
        run: |
          curl -sSX POST \
            --data-binary @kubernetes/base/auth-service/deployment.yaml \
            https://v2.kubesec.io/scan | jq '.[] | select(.score < 4) | error'

  # ── SBOM Generation ──────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - auth-service
          - product-service
          - payment-service
          - order-service
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: "${{ secrets.ECR_REGISTRY }}/nexacommerce/${{ matrix.service }}:${{ github.sha }}"
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Sign image with Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        run: |
          cosign sign --yes \
            ${{ secrets.ECR_REGISTRY }}/nexacommerce/${{ matrix.service }}:${{ github.sha }}

      - name: Attach SBOM to image
        run: |
          cosign attach sbom \
            --sbom sbom-${{ matrix.service }}.spdx.json \
            ${{ secrets.ECR_REGISTRY }}/nexacommerce/${{ matrix.service }}:${{ github.sha }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90
