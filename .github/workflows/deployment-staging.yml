# ============================================================
# GitHub Actions — Staging Deployment Pipeline
# Auto-deploys to STAGING on release tags
# ============================================================

name: Deploy Staging

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true
        type: string

env:
  REGISTRY: ${{ secrets.ECR_REGISTRY }}
  IMAGE_TAG: ${{ inputs.image_tag || github.ref_name }}
  ENVIRONMENT: staging

jobs:
  # ── Pre-deployment Checks ────────────────────────────────
  pre-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify all images exist
        run: |
          for SVC in frontend auth-service product-service cart-service \
                     order-service payment-service inventory-service \
                     search-service notification-service; do
            echo "Checking $SVC:${{ env.IMAGE_TAG }}..."
            aws ecr describe-images \
              --repository-name nexacommerce/$SVC \
              --image-ids imageTag=${{ env.IMAGE_TAG }} \
              --region us-east-1 || exit 1
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ── Deploy to Staging ────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: pre-checks
    environment:
      name: staging
      url: https://staging.nexacommerce.com
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name nexacommerce-staging \
            --region us-east-1

      - name: Update image tags in staging overlay
        run: |
          cd kubernetes/overlays/staging
          for SVC in frontend auth-service product-service cart-service \
                     order-service payment-service inventory-service \
                     search-service notification-service; do
            sed -i "s|newTag: .*|newTag: \"${{ env.IMAGE_TAG }}\"|g" kustomization.yaml
          done

      - name: Commit updated manifests
        run: |
          git config user.name "nexacommerce-bot"
          git config user.email "bot@nexacommerce.com"
          git add kubernetes/overlays/staging/kustomization.yaml
          git diff --staged --quiet || git commit -m \
            "chore(deploy/staging): update image tags to ${{ env.IMAGE_TAG }}"
          git push

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd && sudo mv argocd /usr/local/bin/

      - name: Sync ArgoCD staging app
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --grpc-web
          argocd app sync nexacommerce-staging --prune --timeout 300

      - name: Wait for deployment health
        run: |
          argocd app wait nexacommerce-staging \
            --health --timeout 600

  # ── Run E2E Tests ─────────────────────────────────────────
  e2e-tests:
    name: E2E Tests on Staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Install Playwright
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd frontend && npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://staging.nexacommerce.com
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-staging
          path: frontend/playwright-report/
          retention-days: 14

  # ── Performance Tests ─────────────────────────────────────
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz \
            -L | tar xvz --strip-components 1
          sudo mv k6 /usr/local/bin/

      - name: Run smoke test
        run: |
          k6 run scripts/load-testing/smoke-test.js
        env:
          BASE_URL: https://staging.nexacommerce.com

      - name: Run load test (reduced)
        run: |
          k6 run \
            --env BASE_URL=https://staging.nexacommerce.com \
            --vus 50 \
            --duration 5m \
            scripts/load-testing/load-test.js

  # ── Security Scan (DAST) ──────────────────────────────────
  dast:
    name: DAST Security Scan
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP ZAP
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: "https://staging.nexacommerce.com"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"

  # ── Notify ────────────────────────────────────────────────
  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: [e2e-tests, performance-tests, dast]
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ needs.e2e-tests.result == 'success' && needs.performance-tests.result == 'success' && '✅ Staging deployment succeeded' || '❌ Staging deployment FAILED' }}",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${{ needs.e2e-tests.result == 'success' && '✅' || '❌' }} *Staging Deployment*\n*Tag:* `${{ env.IMAGE_TAG }}`\n*E2E:* ${{ needs.e2e-tests.result }}\n*Perf:* ${{ needs.performance-tests.result }}\n*DAST:* ${{ needs.dast.result }}"
                }
              }]
            }
