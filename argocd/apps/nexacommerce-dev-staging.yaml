# ============================================================
# ArgoCD — DEV Application (auto-sync on every commit)
# ============================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexacommerce-dev
  namespace: argocd
  labels:
    environment: development
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: dev-deployments
spec:
  project: nexacommerce-dev
  source:
    repoURL: https://github.com/your-org/nexacommerce.git
    targetRevision: main
    path: kubernetes/overlays/dev
  destination:
    server: https://eks-dev.us-east-1.eks.amazonaws.com
    namespace: nexacommerce-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
  revisionHistoryLimit: 5
---
# ============================================================
# ArgoCD — STAGING Application
# ============================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexacommerce-staging
  namespace: argocd
  labels:
    environment: staging
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: deployments
    notifications.argoproj.io/subscribe.on-sync-failed.slack: alerts-warning
spec:
  project: nexacommerce-staging
  source:
    repoURL: https://github.com/your-org/nexacommerce.git
    targetRevision: HEAD
    path: kubernetes/overlays/staging
  destination:
    server: https://eks-staging.us-east-1.eks.amazonaws.com
    namespace: nexacommerce-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
