# ============================================================
# ArgoCD — App of Apps (Root Application)
# Bootstraps all environment applications
# ============================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexacommerce-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: nexacommerce-root
    app.kubernetes.io/part-of: nexacommerce
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/nexacommerce.git
    targetRevision: HEAD
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
