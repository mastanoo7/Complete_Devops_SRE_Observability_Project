# ============================================================
# Loki — Production Configuration
# Distributed mode with S3 backend
# ============================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

# ── Common Configuration ──────────────────────────────────
common:
  path_prefix: /loki
  storage:
    s3:
      endpoint: s3.us-east-1.amazonaws.com
      region: us-east-1
      bucketnames: nexacommerce-loki-prod
      insecure: false
  replication_factor: 3
  ring:
    kvstore:
      store: memberlist

# ── Ingester ─────────────────────────────────────────────
ingester:
  lifecycler:
    ring:
      kvstore:
        store: memberlist
      replication_factor: 3
    final_sleep: 0s
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  max_transfer_retries: 0
  wal:
    enabled: true
    dir: /loki/wal

# ── Distributor ───────────────────────────────────────────
distributor:
  ring:
    kvstore:
      store: memberlist

# ── Querier ───────────────────────────────────────────────
querier:
  max_concurrent: 20

# ── Query Frontend ────────────────────────────────────────
frontend:
  compress_responses: true
  max_outstanding_per_tenant: 2048

# ── Schema Configuration ──────────────────────────────────
schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: s3
      schema: v12
      index:
        prefix: loki_index_
        period: 24h

# ── Storage Configuration ─────────────────────────────────
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
    cache_ttl: 24h
  aws:
    s3: s3://nexacommerce-loki-prod
    region: us-east-1

# ── Compactor ─────────────────────────────────────────────
compactor:
  working_directory: /loki/compactor
  shared_store: s3
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# ── Limits Configuration ──────────────────────────────────
limits_config:
  # Retention
  retention_period: 720h    # 30 days
  # Ingestion
  ingestion_rate_mb: 64
  ingestion_burst_size_mb: 128
  per_stream_rate_limit: 32MB
  per_stream_rate_limit_burst: 64MB
  # Query
  max_query_parallelism: 32
  max_query_series: 10000
  max_entries_limit_per_query: 50000
  # Labels
  max_label_names_per_series: 30
  max_label_value_length: 2048

# ── Ruler (LogQL alerts) ──────────────────────────────────
ruler:
  storage:
    type: s3
    s3:
      bucketnames: nexacommerce-loki-rules
      region: us-east-1
  rule_path: /loki/rules
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: memberlist
  enable_api: true
  enable_alertmanager_v2: true

# ── Memberlist (gossip protocol) ──────────────────────────
memberlist:
  join_members:
    - loki-memberlist:7946

# ── Table Manager ─────────────────────────────────────────
table_manager:
  retention_deletes_enabled: true
  retention_period: 720h
