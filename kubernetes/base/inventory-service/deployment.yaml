# ============================================================
# Inventory Service — Base Kubernetes Manifests
# Python FastAPI service for stock management
# ============================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-service
  namespace: nexacommerce-prod
  labels:
    app: inventory-service
    version: v1
    team: inventory
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/nexacommerce-prod-inventory-service-role"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: nexacommerce-prod
  labels:
    app: inventory-service
    version: v1
    team: inventory
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inventory-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: inventory-service
        version: v1
        team: inventory
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "inventory-service"
    spec:
      serviceAccountName: inventory-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [inventory-service]
              topologyKey: topology.kubernetes.io/zone
      containers:
        - name: inventory-service
          image: REGISTRY/nexacommerce/inventory-service:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8086
            - name: metrics
              containerPort: 9090
          env:
            - name: PORT
              value: "8086"
            - name: WORKERS
              value: "4"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: inventory-service-config
            - secretRef:
                name: inventory-service-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8086
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: nexacommerce-prod
  labels:
    app: inventory-service
spec:
  type: ClusterIP
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 80
      targetPort: 8086
    - name: metrics
      port: 9090
      targetPort: 9090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inventory-service
  namespace: nexacommerce-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inventory-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: inventory-service-pdb
  namespace: nexacommerce-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: inventory-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-service-config
  namespace: nexacommerce-prod
data:
  KAFKA_TOPIC_INVENTORY_UPDATED: "inventory.updated"
  KAFKA_CONSUMER_GROUP: "inventory-service-prod"
  RESERVATION_TTL_MINUTES: "30"
  LOW_STOCK_THRESHOLD: "10"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
