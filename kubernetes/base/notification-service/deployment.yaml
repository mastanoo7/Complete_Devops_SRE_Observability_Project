# ============================================================
# Notification Service — Base Kubernetes Manifests
# Node.js service for email/SMS/push notifications
# ============================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service
  namespace: nexacommerce-prod
  labels:
    app: notification-service
    version: v1
    team: platform
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/nexacommerce-prod-notification-service-role"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: nexacommerce-prod
  labels:
    app: notification-service
    version: v1
    team: platform
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification-service
        version: v1
        team: platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "notification-service"
    spec:
      serviceAccountName: notification-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [notification-service]
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: notification-service
          image: REGISTRY/nexacommerce/notification-service:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8087
            - name: metrics
              containerPort: 9090
          env:
            - name: PORT
              value: "8087"
            - name: NODE_ENV
              value: "production"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: notification-service-config
            - secretRef:
                name: notification-service-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8087
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: nexacommerce-prod
  labels:
    app: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - name: http
      port: 80
      targetPort: 8087
    - name: metrics
      port: 9090
      targetPort: 9090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service
  namespace: nexacommerce-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notification-service-pdb
  namespace: nexacommerce-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: notification-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: nexacommerce-prod
data:
  KAFKA_TOPICS: "order.created,order.updated,payment.processed,user.registered"
  KAFKA_CONSUMER_GROUP: "notification-service-prod"
  EMAIL_FROM: "noreply@nexacommerce.com"
  EMAIL_PROVIDER: "sendgrid"
  SMS_PROVIDER: "twilio"
  PUSH_PROVIDER: "firebase"
  RETRY_MAX_ATTEMPTS: "3"
  RETRY_BACKOFF_MS: "1000"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
